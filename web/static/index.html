<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Spanish Teacher</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header>
    <h1>AI Spanish Teacher</h1>
    <div id="phase-badge" class="phase-badge">Pick a mode</div>
  </header>

  <main>
    <section id="mode-panel">
      <div class="mode-grid">
        <button class="mode-btn" data-mode="story">
          <strong>📖 Wikipedia story</strong>
          <span>Hear a story from today in history, then chat about it.</span>
        </button>
        <button class="mode-btn" data-mode="homework">
          <strong>📝 Homework lesson</strong>
          <span>Work through your latest homework with the tutor.</span>
        </button>
        <button class="mode-btn" data-mode="flashcards">
          <strong>🃏 Flashcards</strong>
          <span>Say the Spanish word for each English prompt.</span>
        </button>
        <button class="mode-btn" data-mode="fill_blanks">
          <strong>✏️ Fill in the blanks</strong>
          <span>Say the missing word in each sentence.</span>
        </button>
      </div>
      <p class="mode-hint">Switching mode mid-session discards the current session — nothing is saved.</p>
    </section>

    <section id="avatar-panel">
      <div id="avatar" class="avatar avatar--idle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="avatar-face" cx="50" cy="50" r="42"/>
          <circle class="avatar-eye" cx="35" cy="45" r="4"/>
          <circle class="avatar-eye" cx="65" cy="45" r="4"/>
          <path class="avatar-mouth" d="M 32 64 Q 50 76 68 64" fill="none" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <p id="status-text">Pick a mode above to start.</p>
    </section>

    <section id="story-panel" hidden>
      <h2 id="story-title"></h2>
      <p id="story-text"></p>
    </section>

    <section id="exercise-panel" hidden>
      <div class="exercise-header">
        <h2 id="exercise-title"></h2>
        <span id="exercise-progress" class="exercise-progress"></span>
      </div>
      <p id="card-main" class="card-main"></p>
      <p id="card-hint" class="card-hint"></p>
      <div id="judgement" class="judgement" hidden>
        <p id="judgement-text"></p>
      </div>
      <button id="btn-next" class="next-btn" hidden>Next card →</button>
    </section>

    <section id="chat-panel" hidden>
      <div id="chat-log"></div>
    </section>

    <section id="controls" hidden>
      <div class="device-pickers">
        <label>Microphone
          <select id="input-device"></select>
        </label>
        <label>Speaker
          <select id="output-device"></select>
        </label>
      </div>
      <div class="record-controls">
        <button id="btn-en" class="lang-btn">🎙 English</button>
        <button id="btn-es" class="lang-btn">🎙 Español</button>
        <button id="btn-stop" class="stop-btn" disabled>Stop</button>
        <button id="btn-finish" class="finish-btn">Finish session</button>
        <button id="btn-quit" class="quit-btn">Quit (discard)</button>
      </div>
    </section>

    <section id="complete-panel" hidden>
      <h2>Session complete</h2>
      <div id="complete-links"></div>
    </section>
  </main>

  <audio id="player"></audio>

  <script src="/static/js/audio-playback.js"></script>
  <script src="/static/js/audio-capture.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
